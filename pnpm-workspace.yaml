packages:
  - packages/*
  - commands/*
  - utils/*

allowBuilds:
  '@swc/core': true
  '@tsparticles/engine': true
  esbuild: true
  nx: true

ignoredBuiltDependencies:
  - nx

onlyBuiltDependencies:
  - '@swc/core'
  - '@tsparticles/engine'
  - core-js
  - esbuild
  - fsevents

patchedDependencies:
  tsup@8.5.1: utils/patches/tsup@8.5.1.patch
